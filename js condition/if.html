<!DOCTYPE html>
<html>

<body>
    <h1>Java Script if
    </h1>

    <p>Mengucapkan "Selamat Siang" jika kurang dari jam 18:00:</p>

    <p id="demo">Selamat Sore!</p>

    <script>
        if (new Date().getHours() < 18) {
            document.getElementById("demo").innerHTML = "Selamat Siang!";
        }
    </script>
</body>

</html>
