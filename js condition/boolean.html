<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Booleans</h1>
<p>Booleans and boolean objects cannot be safely compared:</p>

<p id="demo"></p>

<script>
// Create a Boolean
let x = Boolean(false);

// Create a Boolean Object
let y = new Boolean(false);

document.getElementById("demo").innerHTML = (x===y);
</script>

</body>
</html>
